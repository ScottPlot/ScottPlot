name: Comment on Old Draft PRs

on:
  pull_request:
    types: [labeled]

jobs:
  comment-on-old-draft:
    if: github.event.label.name == 'Old Draft'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Post stale draft comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `This PR has been in **draft** state for a long time.

            If you'd like to keep this PR open, please:
            - Mark it as **Ready for review**, or
            - Leave a comment with a status update

            Otherwise, it may be closed in the near future. Thanks!`
            });
